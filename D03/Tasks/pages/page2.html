<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms List</title>

    <link rel="stylesheet" href="../css/style2.css">
</head>
<body>

<div class="container">

    <div class="item">
        <div class="icon yellow">
            <i class="fa-solid fa-pen-to-square"></i>
        </div>

        <div class="content">
            <h3>General forms</h3>
            <p>Build, design, and translate signup forms and response emails.</p>
        </div>

        <button>Select</button>
    </div>

    <div class="item">
        <div class="icon blue">
            <i class="fa-solid fa-code"></i>
        </div>

        <div class="content">
            <h3>Embedded forms</h3>
            <p>Generate HTML code to embed in your site or blog to collect signups.</p>
        </div>

        <button>Select</button>
    </div>

    <div class="item">
        <div class="icon red">
            <i class="fa-regular fa-clone"></i>
        </div>

        <div class="content">
            <h3>Subscriber popup</h3>
            <p>Design a popup signup form that can be embedded on any site.</p>
        </div>

        <button>Select</button>
    </div>

</div>

</body>
</html>
