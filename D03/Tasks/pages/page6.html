<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sponsorship Form</title>
    <link rel="stylesheet" href="../css/style6.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>sponsorship</h1>
    </div>

    <form>

        <h3>Non-profit Organization</h3>

        <div class="row">
            <div>
                <label>Name:</label>
                <input type="text">
            </div>

            <div>
                <label>Phone Number:</label>
                <input type="text">
            </div>
        </div>

        <label>Street Address:</label>
        <input type="text" class="full">

        <div class="row">
            <div>
                <label>City:</label>
                <input type="text">
            </div>

            <div>
                <label>State:</label>
                <input type="text">
            </div>

            <div>
                <label>Zip Code:</label>
                <input type="text">
            </div>
        </div>

        <hr>

        <h3>Sponsor Contact Information</h3>

        <div class="row">
            <div>
                <label>First Name:</label>
                <input type="text">
            </div>

            <div>
                <label>Last Name:</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Phone Number:</label>
                <input type="text">
            </div>

            <div>
                <label>Email Address:</label>
                <input type="email">
            </div>
        </div>

        <label>Street Address:</label>
        <input type="text" class="full">

        <div class="row">
            <div>
                <label>City:</label>
                <input type="text">
            </div>

            <div>
                <label>State:</label>
                <input type="text">
            </div>

            <div>
                <label>Zip Code:</label>
                <input type="text">
            </div>
        </div>

        <hr>

        <div class="row">
            <div>
                <label>Donation Amount:</label>
                <select>
                    <option>$50</option>
                    <option>$100</option>
                    <option>$200</option>
                    <option>$500</option>
                </select>
            </div>

            <div>
                <label>Payment Method:</label>
                <select>
                    <option>Visa</option>
                    <option>MasterCard</option>
                    <option>Cash</option>
                </select>
            </div>
        </div>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
