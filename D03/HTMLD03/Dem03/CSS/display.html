<html>

<head>
    <title>Display</title>
    <style>
        div,
        p,
        span {
            background-color: lightgreen;
            border: 2px solid darkgoldenrod;
            color: darkblue;
            /*space between div and next sibling*/
            margin: 5px;
            /*Equale space from whole edges*/
            /* margin-top: 50px;
            margin-bottom: 70px; */
            /*space between eleemtn and nested content child*/
            /* padding-top: 40px;
            padding-bottom: 70px;
            padding-left: 80; */
            padding: 10px;
            width: 250px;
            height: 25px;
            /*chnage default display ===>block to inline*/
            /* display: inline;No width and height */
            /*Main features of two display styles*/
            display: inline-block;
        }
    </style>
</head>

<body>
    <div>ITI Mansoura Branch</div>
    <div>ITI Mansoura Branch</div>
    <div>ITI Mansoura Branch</div>
    <span>ITI Mansoura Branch</span>
    <span>ITI Mansoura Branch</span>
    <span>ITI Mansoura Branch</span>
    <p>ITI MAnsoura Branch</p>
    <p>ITI MAnsoura Branch</p>
    <p>ITI MAnsoura Branch</p>
    <p>ITI MAnsoura Branch</p>
</body>

</html>
